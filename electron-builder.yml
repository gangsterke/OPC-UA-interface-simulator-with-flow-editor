appId: com.interfacesimulator.app
productName: Interface Simulator
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: build/icon.png
    to: icon.png
asar: true
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  category: Development
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
